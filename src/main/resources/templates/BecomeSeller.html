<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seller Registeration</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<style>
.seller-card {
	background: #ffffff;
	border-left: 6px solid #008ecc;
}

.form-control, .form-select, textarea {
	border-radius: 10px;
	padding: 10px 12px;
}

.form-control:focus, .form-select:focus, textarea:focus {
	border-color: #008ecc;
	box-shadow: 0 0 0 0.15rem rgba(0, 142, 204, 0.25);
}

.btn-primary {
	border-radius: 10px;
}

label {
	color: #444;
}
</style>

</head>
<body>
	<div class="container-fluid">
		<div class="row mt-5 mb-5">
			<div class="col-lg-9 col-md-10 mx-auto">

				<div class="card shadow-lg border-0 rounded-4 seller-card p-5">
					<div class="text-center mb-4">
						<h2 class="fw-bold text-primary">Become a TechBazaar Seller</h2>
						<p class="text-muted">Start selling your products and grow
							your business 🚀</p>
					</div>

					<form action="/BecomeSeller" method="post" th:object="${dto}"
						enctype="multipart/form-data">
						<div class="row g-4">

							<div class="col-sm-6">
								<label class="form-label fw-semibold">Full Name</label> <input
									th:field="${dto.name}" type="text" class="form-control"
									placeholder="Enter full name" required>
							</div>

							<div class="col-sm-6">
								<label class="form-label fw-semibold">Email Address</label> <input
									th:field="${dto.email}" type="email" class="form-control"
									placeholder="Enter email address" required>
							</div>

							<div class="col-sm-6">
								<label class="form-label fw-semibold">Contact Number</label> <input
									th:field="${dto.contactNo}" type="text" class="form-control"
									placeholder="Enter mobile number" pattern="[6-9]\d{9}" required>
							</div>

							<div class="col-sm-6">
								<label class="form-label fw-semibold">Password</label> <input
									th:field="${dto.password}" type="password" class="form-control"
									placeholder="Create strong password" required>
							</div>

							<div class="col-sm-6">
								<label class="form-label fw-semibold">Gender</label> <select
									th:field="${dto.gender}" class="form-select">
									<option value="">--- Select Gender ---</option>
									<option value="Male">Male</option>
									<option value="Female">Female</option>
									<option value="Other">Other</option>
								</select>
							</div>


							<div class="col-sm-6">
								<label class="form-label fw-semibold">Upload Profile Pic</label>
								<input th:field="${dto.profilePic}" type="file"
									class="form-control" required
									accept=".png, .jpg, .jpeg, .webp, .bmp">
							</div>

							<div class="col-sm-6">
								<label class="form-label fw-semibold">PAN Card Number</label> <input
									th:field="${dto.panCard}" type="text" class="form-control"
									placeholder="ABCDE1234F" required>
							</div>

							<div class="col-sm-6">
								<label class="form-label fw-semibold">Aadhaar Number</label> <input
									th:field="${dto.aadharNo}" type="text" class="form-control"
									placeholder="Enter Aadhaar number" required>
							</div>

							<div class="col-sm-6">
								<label class="form-label fw-semibold">GST Number</label> <input
									th:field="${dto.gstNo}" type="text" class="form-control"
									placeholder="22AAAAA0000A1Z5" required>
							</div>

							<div class="col-sm-12">
								<label class="form-label fw-semibold">Business Address</label>
								<textarea th:field="${dto.address}" rows="3"
									class="form-control"
									placeholder="Enter complete business address" required></textarea>
							</div>

							<div
								class="col-sm-12 d-flex justify-content-between align-items-center mt-3">
								<span class="text-muted small"> 🔒 Your details are safe
									and secure </span>
								<button type="submit"
									class="btn btn-primary px-5 py-2 fw-semibold">
									Register as Seller</button>
							</div>

						</div>
					</form>

					<p class="text-center mt-4">
						Already a seller? <a href="/Login"
							class="text-primary fw-semibold text-decoration-none"> Login
							here </a>
					</p>

				</div>

			</div>
		</div>
	</div>
