<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
.login-card {
    border: 2px solid #008ecc;
    background: #ffffff;
}

.form-control {
    border-radius: 10px;
}

.btn {
    border-radius: 10px;
}

/* Floating Image Animation */
.floating-img {
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* Input Focus */
.form-control:focus {
    border-color: #008ecc;
    box-shadow: 0 0 0 0.15rem rgba(0, 142, 204, 0.25);
}
</style>
    
  </head>
  <body>
    
 <!-- Login Start -->
<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-9 col-md-11 shadow-lg rounded-4 login-card">
      <div class="row g-0">

        <!-- Left Image Section -->
        <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center bg-light rounded-start-4">
          <img src="images/login.jpeg" alt="Login"
               class="img-fluid p-4 floating-img" style="height:450px; width:450px;">
        </div>

        <!-- Right Form Section -->
        <div class="col-lg-6 col-12 p-4 p-md-5">
          <h2 class="text-primary fw-bold text-center">Welcome Back 👋</h2>
          <p class="text-center text-muted mb-4">Login to continue to TechBazaar</p>

          <form action="/Login" method="post" th:object="${dto}">

            <div class="form-floating mb-3">
              <input th:field="${dto.email}" type="email"
                     class="form-control" id="floatingInput"
                     placeholder="name@example.com">
              <label for="floatingInput">Email Address</label>
            </div>

            <div class="form-floating mb-3">
              <input th:field="${dto.password}" type="password"
                     class="form-control" id="floatingPassword"
                     placeholder="Password">
              <label for="floatingPassword">Password</label>
            </div>

            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-3">
              <div class="mb-2 mb-sm-0">
                <input type="checkbox"> Remember me
              </div>
              <a href="#" class="text-decoration-none small text-primary">
                Forgot Password?
              </a>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
              Login
            </button>

            <p class="text-center mt-3">
              Don’t have an account?
              <a href="/Register" class="fw-semibold text-primary">Create Account</a>
            </p>

            <!-- Buttons -->
            <div class="row g-2 mt-3">
              <div class="col-12 col-sm-6">
                <a href="/" class="btn btn-outline-danger w-100">
                  <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
                </a>
              </div>
              <div class="col-12 col-sm-6">
                <a href="/BecomeSeller" class="btn btn-outline-primary w-100">
                  <i class="fa-solid fa-store"></i> Become a Seller
                </a>
              </div>
            </div>

          </form>
        </div>

      </div>
    </div>
  </div>
</div>
<!-- Login End -->
    
    
    

    
    
        
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script type="text/javascript">
  var msg="[[${msg}]]";
  if(msg!=""){
	  alert(msg);
  }
  </script>
  </body>
</html>
