<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    
     <!--login start-->
        <div class="row mt-5 mb-5">
            <div class="col-sm-9 mx-auto border border-3 border-primary rounded-3 shadow">
                <div class="row">
                    <div class="col-sm-6">
                        <img src="images/login.jpeg" alt="" class="h-75 img-fluid ms-2 mt-5 d-block">
                    </div>
                    <div class="col-sm-6 p-5">
                        <h1 class="text-primary text-center">Welcome Back!</h1>
                        <p class="text-center">Login to your account.</p>
                        <form action="/Login" method="post" th:object="${dto}">
                            <div class="form-floating mb-3 mx-auto">
                                <input th:field="${dto.email}" type="email" class="form-control" id="floatingInput"
                                    placeholder="name@example.com">
                                <label for="floatingInput">Username</label>
                            </div>
                            <div class="form-floating">
                                <input th:field="${dto.password}" type="password" class="form-control py-2" id="floatingPassword"
                                    placeholder="Password">
                                <label for="floatingPassword">Password</label>
                            </div>
                            <input type="checkbox" class="mt-3"> Remember me
                            <input type="submit" value="Login" class="btn btn-primary form-control mt-3"/>
                            <p class="text-center">Forget <a href="#">Password?</a></p>
                            <p class="text-center">Don’t have an account? <a href="/Register">Create Account</a></p>
                            <a href="/" class="btn btn-danger w-50 mx-auto"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
                    
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!--login end-->
        
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script type="text/javascript">
  var msg="[[${msg}]]";
  if(msg!=""){
	  alert(msg);
  }
  </script>
  </body>
</html>
