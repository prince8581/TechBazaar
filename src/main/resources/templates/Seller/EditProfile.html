<html  th:replace="~{Seller/Sellerbase::layout(~{::main})}">
<body>
<main>

<!-- ===== Header ===== -->
<div class="row bg-primary align-items-center px-4 py-3">
  <div class="col-md-9">
    <h4 class="text-white fw-bold mb-0">
      <i class="bi bi-person-gear me-2"></i>Edit Seller Profile
    </h4>
  </div>
  <div class="col-md-3 text-md-end text-center mt-2 mt-md-0">
    <a href="/Seller/Sellerbase" class="btn btn-info btn-sm fw-bold">
      Dashboard
    </a>
  </div>
</div>

<!-- ===== Main Container ===== -->
<div class="container pb-5">
  <div class="row">
    <div class="col-lg-11 mx-auto">
      <div class="card shadow-lg mt-4 border-0 rounded-4">

        <!-- Card Title -->
        <div class="card-header bg-primary bg-opacity-75 text-center rounded-top-4">
          <h5 class="fw-bold mb-0 text-white">
            Update <span class="text-warning">Seller Information</span>
          </h5>
        </div>

        <div class="card-body px-4 py-4">
          <form th:action="@{/Seller/EditProfile}" th:object="${loggedInSeller}" method="post" enctype="multipart/form-data">
            <div class="row g-4">

              <!-- ===== Profile Image ===== -->
              <div class="col-12 text-center">
              <input type="hidden" th:field="*{id}">
                <img id="previewImg" th:src="${session.loggedInSeller.profilePic != null} ? @{/uploads/{img}(img = ${session.loggedInSeller.profilePic})} : @{/assets/img/user_img.jpg}" class="rounded-circle border border-4 border-primary shadow" width="100" height="100" alt="image not found">
                <p class="text-muted mt-2">Upload Seller Profile Photo</p>
              </div>

              <!-- ===== Personal Details ===== -->
              <div class="col-12">
                <h6 class="fw-bold text-primary border-bottom pb-1">
                  Personal Details
                </h6>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Update Seller Name</label>
                <input th:field="*{name}" type="text" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Contact Number</label>
                <input th:field="*{contactNo}" type="text" class="form-control"
                       pattern="[6-9]\d{9}" required>
              </div>

           

    

              <!-- ===== Business & Documents ===== -->
              <div class="col-12 mt-3">
                <h6 class="fw-bold text-primary border-bottom pb-1">
                  Business & Legal Details
                </h6>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">PAN Number</label>
                <input th:field="*{panCard}" type="text" class="form-control"
                       pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
                       placeholder="ABCDE1234F" required>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Aadhaar Number</label>
                <input th:field="*{aadharNo}" type="text" class="form-control"
                       pattern="\d{12}"
                       placeholder="12 digit Aadhaar" required>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">GST Number</label>
                <input th:field="*{gstNo}" type="text" class="form-control"
                       placeholder="22ABCDE1234F1Z5" required>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Profile Picture</label>
                <input type="file" name="profileImage"
                       class="form-control"
                       accept=".png, .jpg, .jpeg, .webp, .bmp"
                       onchange="previewImage(event)" required>
              </div>

              <!-- ===== Address ===== -->
              <div class="col-12">
                <label class="form-label fw-semibold">Business Address</label>
                <textarea th:field="*{address}" class="form-control" rows="3" required></textarea>
              </div>

              <!-- ===== Submit ===== -->
              <div class="col-12 text-center mt-4">
                <button type="submit" class="btn btn-info px-5 fw-bold shadow">
                  <i class="bi bi-save me-1"></i> Update Profile
                </button>
              </div>

            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- ===== Image Preview Script ===== -->
<script>
var msg="[[${msg}]]";
if(msg!=""){
	alert("Profile updated Successfully!")
}
function previewImage(event) {
  document.getElementById('previewImg').src =
    URL.createObjectURL(event.target.files[0]);
}
</script>


</main>
</body>

</html>
