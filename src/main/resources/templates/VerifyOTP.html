<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify OTP | TechBazaar</title>

    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #2563eb, #7c3aed);
            --surface-glass: rgba(255, 255, 255, 0.12);
            --border-glass: rgba(255, 255, 255, 0.2);
            --accent: #fdbb2d;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
            color: #f8fafc;
        }

        /* Background Animated Orbs */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
            animation: float 20s infinite alternate;
        }

        .orb-1 {
            background: #3b82f6;
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            background: #8b5cf6;
            bottom: -100px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 100px);
            }
        }

        .verification-container {
            padding: 20px;
            width: 100%;
            max-width: 480px;
        }

        .glass-card {
            background: var(--surface-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: var(--primary-gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 30px;
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        h2 {
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .sub-text {
            color: #94a3b8;
            margin-bottom: 35px;
            font-size: 15px;
        }

        .otp-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .otp-input {
            width: 52px;
            height: 60px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .otp-input:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            outline: none;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
        }

        .verify-btn {
            background: var(--primary-gradient);
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: 0.3s;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
            filter: brightness(1.1);
        }

        .verify-btn:active {
            transform: translateY(0);
        }

        /* Timer Section */
        .timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .progress-loader {
            width: 45px;
            height: 45px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-loader svg {
            transform: rotate(-90deg);
        }

        .progress-loader circle {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
        }

        .bg-ring {
            stroke: rgba(255, 255, 255, 0.1);
        }

        .progress-ring {
            stroke: var(--accent);
            stroke-dasharray: 126;
            stroke-dashoffset: 0;
            transition: 1s linear;
        }

        .timer-val {
            position: absolute;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }

        .resend-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .resend-link strong {
            color: #3b82f6;
        }

        .resend-link:hover {
            color: white;
        }

        @media (max-width: 576px) {
            .otp-input {
                width: 42px;
                height: 52px;
                font-size: 20px;
            }

            .glass-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="verification-container">
        <div class="glass-card">
            <div class="brand-icon">
                <i class="fa-solid fa-shield-halved"></i>
            </div>

            <h2>Verify Account</h2>
            <p class="sub-text">Please enter the 6-digit code sent to your email</p>

            <form id="otpForm" action="/verify-otp" method="post">
                <div class="otp-group">
                    <input type="text" maxlength="1" class="otp-input" required autocomplete="off">
                    <input type="text" maxlength="1" class="otp-input" required autocomplete="off">
                    <input type="text" maxlength="1" class="otp-input" required autocomplete="off">
                    <input type="text" maxlength="1" class="otp-input" required autocomplete="off">
                    <input type="text" maxlength="1" class="otp-input" required autocomplete="off">
                    <input type="text" maxlength="1" class="otp-input" required autocomplete="off">
                </div>

                <input type="hidden" name="otp" id="finalOtp">

                <button type="submit" class="verify-btn">
                    <i class="fa-solid fa-circle-check me-2"></i> Verify Now
                </button>
            </form>

            <div class="timer-container">
                <div class="progress-loader">
                    <svg width="45" height="45">
                        <circle cx="22.5" cy="22.5" r="20" class="bg-ring"></circle>
                        <circle cx="22.5" cy="22.5" r="20" class="progress-ring" id="progressRing"></circle>
                    </svg>
                    <div class="timer-val" id="timerText">60</div>
                </div>
                <span class="text-white-50 small">Code expires in seconds</span>
            </div>

            <p class="mb-0">
                <a href="/ResendOTP" class="resend-link">
                    Didn't receive the code? <strong>Resend OTP</strong>
                </a>
            </p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const inputs = document.querySelectorAll(".otp-input");
            const progressRing = document.getElementById("progressRing");
            const timerText = document.getElementById("timerText");
            const form = document.getElementById("otpForm");

            const totalTime = 60;
            const radius = 20;
            const circumference = 2 * Math.PI * radius;

            progressRing.style.strokeDasharray = circumference;
            progressRing.style.strokeDashoffset = 0;

            // OTP Navigation and Input logic
            inputs.forEach((input, index) => {
                input.addEventListener("input", function (e) {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if (this.value.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });

                input.addEventListener("keydown", function (e) {
                    if (e.key === "Backspace" && this.value === "" && index > 0) {
                        inputs[index - 1].focus();
                    }
                });

                // Paste support
                input.addEventListener("paste", function (e) {
                    e.preventDefault();
                    const pasteData = e.clipboardData.getData('text').slice(0, 6).split('');
                    pasteData.forEach((char, i) => {
                        if (inputs[i]) {
                            inputs[i].value = char;
                            if (inputs[i + 1]) inputs[i + 1].focus();
                        }
                    });
                });
            });

            // Timer Logic
            let timeLeft = totalTime;
            const timerTask = setInterval(() => {
                timeLeft--;
                timerText.innerText = timeLeft;
                const offset = circumference - (timeLeft / totalTime) * circumference;
                progressRing.style.strokeDashoffset = offset;

                if (timeLeft <= 0) {
                    clearInterval(timerTask);
                    Swal.fire({
                        icon: 'warning',
                        title: 'Time Expired',
                        text: 'The OTP has expired. Please request a new one.',
                        background: '#1e293b',
                        color: '#fff',
                        confirmButtonColor: '#3b82f6'
                    });
                }
            }, 1000);

            // Submission logic
            form.addEventListener("submit", function (e) {
                e.preventDefault();
                let otpValue = "";
                inputs.forEach(input => otpValue += input.value);
                document.getElementById("finalOtp").value = otpValue;

                if (otpValue.length < 6) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Invalid Entry',
                        text: 'Please enter the complete 6-digit code.',
                        background: '#1e293b',
                        color: '#fff',
                        confirmButtonColor: '#ef4444'
                    });
                } else {
                    Swal.fire({
                        title: 'Verifying...',
                        text: 'Please hold on while we validate your code.',
                        background: '#1e293b',
                        color: '#fff',
                        allowOutsideClick: false,
                        didOpen: () => {
                            Swal.showLoading();
                        }
                    });

                    // Submitting the form
                    setTimeout(() => {
                        form.submit();
                    }, 800);
                }
            });

            // Auto-focus first input
            inputs[0].focus();
        });
    </script>

</body>

</html>
