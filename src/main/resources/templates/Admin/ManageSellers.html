<html  th:replace="~{Admin/Adminbase::layout(~{::main})}">
<body>
<main>
<div class="row">
<div class="col-sm-12 ">
<div class="card shadow">
<div class="card-header bg-primary">
<h4 class="text-center m-0 text-white">Manage Sellers</h4>
</div>
<div class="card-body">
<div class="table-responsive">
<table class="table table-bordered" id="example">
<thead>
<tr >
<th>S. No</th>
<th>ProfilePic</th>
<th>Name</th>
<th>Gender</th>
<th>Contact No</th>
<th>Email</th>
<th>Address</th>
<th>AadhaarNo</th>
<th>GST. No</th>
<th>PAN. No</th>
<th>Reg Date</th>
<th>User Stastus</th>
<th>Action</th>
</tr>
</thead>

<tbody>
<tr th:each="seller,srno:${sellers}">
<td th:text="${srno.index+1}"></td>
<td class="text-center">
<img th:src="${seller.profilePic != null} ? @{/uploads/{img}(img=${seller.profilePic})} : @{/assets/img/user_img.jpg}" alt="image not found" height="50px" width="50px" class="rounded-circle border border-3 border-warning profile-img"
style="cursor: pointer;">
<!--<img alt="image not found" th:src="@{${seller.profilePic != NULL} ? '/ProfilePic/'+${seller.profilePic} : '../assets/img/user_img.jpg'}" height="50px" width="50px" class="profile-img" style="cursor:pointer;">-->
</td>
<td th:text="${seller.name}"></td>
<td th:text="${seller.gender}"></td>
<td th:text="${seller.contactNo}"></td>
<td th:text="${seller.email}"></td>
<td th:text="${seller.address}"></td>
<td th:text="${seller.aadharNo}"></td>
<td th:text="${seller.gstNo}"></td>
<td th:text="${seller.panCard}"></td>
<td th:text="${#temporals.format(seller.regDate, 'dd-MM-yyyy hh:mm a')}"></td>
<td>
<a onclick="return confirm('Are you sure want to update user status?')" th:href="@{'UpdateUserStatus/'+${seller.id}}" class="btn btn-sm " th:classappend="${seller.userStatus.name() == 'UNBLOCKED' ? 'btn-primary' : 'btn-danger'}" th:text="${seller.userStatus}"></a>
</td>
<td>
<!--  <a href="#" class="btn btn-success btn-sm">Edit</a>-->
<a th:href="@{'DeleteUser/'+${seller.id}}" onclick="return confirm('Are you sure want to delete?')" class="btn btn-danger btn-sm">Delete</a></td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
</div>
</div>
</main>
</body>

</html>
