
<html th:replace="~{base::layout(~{::main})}">
 <body>
 
    <main>
   
    
    
    <div class="row mb-5">
     <div class="col-sm-11 mx-auto">
     <div class="mt-4">
       <h4>My Orders</h4>
       <p>Track Your Order History From Here....</p>
     
     </div>
     </div>
     <div class="col-lg-10 mt-2 col-sm-12 mx-auto p-1">
     <div class="card shadow p-2 my-2" th:each="order: ${orders}">
     <div class="row">
     <div class="col-md-2">
     <img alt="image not found" th:src="@{'/ProductImages/'+${order.product.productImages[0]}}" height="130px" width="130px" class="p-2">
     </div>
     <div class="col-md-7 pt-3">
     <h5 class="m-0" th:text="${order.product.productName}">Product Title</h5>
     <p class="text-muted m-0" th:text="${#strings.abbreviate(order.product.productDescription, 150)}">place your product description here...</p>
     </div>
     <div class="col-md-3 my-auto text-center">
     <div class="badge text-bg-secondary w-75  py-2 my-2 mb-4" th:text="${order.orderstatus}">
     
     </div>
     <div class="d-flex align-items-center justify-content-center">
       <a href="/TrackOrder" class="btn btn-outline-warning">Track Order</a>
     <a href="#" class="btn btn-danger mx-2">Cancel Order</a>
     </div>
   
     </div>
     </div>
     </div>
     </div>
     
    </div>
   
    
    </main>
  </body>
</html>
