
<html th:replace="~{base::layout(~{::main})}">
<body>
	<main>
		<div class="container-fluid py-5 bg-light">
			<div class="container">
				<div class="row g-5 align-items-stretch">

					<!-- Left Info Section -->
					<div class="col-md-5">
						<div class="p-4 p-md-5 rounded-4 shadow-lg text-white h-100"
							style="background: linear-gradient(135deg, #008ecc, #005f99);">

							<h2 class="fw-bold mb-3">Let’s Talk 👋</h2>
							<p class="opacity-75">Have questions about products, orders,
								or services? Our TechBazaar support team is always ready to help
								you.</p>

							<div class="mt-4">
								<div class="d-flex align-items-center mb-3">
									<div class="bg-white text-primary rounded-circle p-2 me-3">
										📞</div>
									<div>
										<small class="opacity-75">Phone</small><br> <strong>+91
											98765 43210</strong>
									</div>
								</div>

								<div class="d-flex align-items-center mb-3">
									<div class="bg-white text-primary rounded-circle p-2 me-3">
										✉️</div>
									<div>
										<small class="opacity-75">Email</small><br> <strong>support@techbazaar.com</strong>
									</div>
								</div>

								<div class="d-flex align-items-center">
									<div class="bg-white text-primary rounded-circle p-2 me-3">
										📍</div>
									<div>
										<small class="opacity-75">Location</small><br> <strong>India</strong>
									</div>
								</div>
							</div>

						</div>
					</div>
					<!-- Left Info Section end -->

					<!-- Right Enquiry Form -->
					<div class="col-md-7">
						<div class="card border-0 shadow-lg rounded-4">
							<div class="card-header text-center bg-white border-0 pt-4">
								<h3 class="fw-bold text-primary mb-1">Contact TechBazaar</h3>

								<p class="text-muted mb-0">We usually respond within 24
									hours</p>
								<p class="text-success text-center p-1" th:if="${msg}"
									th:text="${msg}"></p>

							</div>

							<div class="card-body p-4 p-md-5">
								<form method="post" action="/ContactUs" th:object="${dto}">

									<div class="row g-3">
										<div class="col-md-6">
											<label class="form-label fw-semibold">Full Name</label> <input
												th:field="${dto.name}" type="text"
												class="form-control form-control-lg"
												placeholder="Enter your name" required>
										</div>

										<div class="col-md-6">
											<label class="form-label fw-semibold">Contact Number</label>
											<input th:field="${dto.contactNo}" type="text"
												class="form-control form-control-lg"
												placeholder="Enter contact number" required>
										</div>
									</div>

									<div class="mt-3">
										<label class="form-label fw-semibold">Email Address</label> <input
											th:field="${dto.email}" type="email"
											class="form-control form-control-lg"
											placeholder="Enter email" required>
									</div>

									<div class="mt-3">
										<label class="form-label fw-semibold">Subject</label> <input
											th:field="${dto.title}" type="text"
											class="form-control form-control-lg"
											placeholder="Enter subject">
									</div>

									<div class="mt-3">
										<label class="form-label fw-semibold">Message</label>
										<textarea th:field="${dto.message}"
											class="form-control form-control-lg" rows="4"
											placeholder="Write your message here..." required></textarea>
									</div>

									<div class="d-grid mt-4">
										<button type="submit"
											class="btn btn-primary btn-lg rounded-pill"
											onclick="return confirm('Are you Sure want to send Enquiry.')">
											🚀 Send Enquiry</button>
									</div>

								</form>
							</div>
						</div>

						<!-- Success Message -->
						<div
							class="alert alert-success mt-4 text-center rounded-pill shadow-sm">
							✅ Your enquiry has been sent successfully!</div>
					</div>

				</div>
			</div>
		</div>


	</main>
</body>
</html>
